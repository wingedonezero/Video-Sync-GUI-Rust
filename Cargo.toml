[package]
name = "vsg"
version = "0.1.0"
edition = "2021"

[dependencies]
# GUI
iced = { version = "0.13.1", features = ["multi-window"] }
iced_aw = { version = "0.12.2", default-features = false, features = ["modal", "card", "tabs"] }

# Serialization / config
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Process / system
tokio = { version = "1", features = ["process", "rt-multi-thread", "macros", "io-util"] }
which = "4.4"

# Audio / analysis
hound = "3.5"
rubato = "0.12"
realfft = "3.3"
ndarray = "0.15"
libc = "0.2"

# Video / mkv utils
regex = "1"
quick-xml = "0.31"
tempfile = "3.10"

# General utilities
anyhow = "1.0"
thiserror = "1.0"
log = "0.4"
env_logger = "0.11"

# For collections / signatures
indexmap = "2.2"

# Native dialogs + zip + worker channel
rfd = "0.14"
zip = { version = "0.6", default-features = false, features = ["deflate"] }
crossbeam-channel = "0.5"
