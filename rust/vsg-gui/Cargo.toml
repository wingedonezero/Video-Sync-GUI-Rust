[package]
name = "vsg-gui"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
imgui = "0.12"
imgui-winit-support = "0.13"          # winit 0.30 API
imgui-glow-renderer = "0.12"
winit = { version = "0.30", features = ["x11","wayland"] }
glow = "0.13"

glutin = "0.31.3"
glutin-winit = "0.5.0"                 # matches winit 0.30 + glutin 0.31

vsg-core = { path = "../vsg-core" }
