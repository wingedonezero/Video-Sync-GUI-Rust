[package]
name = "vsg-gui"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
imgui = "0.12"
imgui-winit-support = "0.12"
imgui-glow-renderer = "0.12"
winit = { version = "0.29", features = ["x11","wayland"] }
glow = "0.13"

# Pin to raw-window-handle 0.5-compatible glutin
glutin = "=0.30.10"
glutin-winit = "=0.4.2"

vsg-core = { path = "../vsg-core" }
