[package]
name = "vsg-gui"
version = "0.1.0"
edition = "2021"

[dependencies]
vsg-core = { path = "../vsg-core" }

imgui = "0.12"
imgui-winit-support = { version = "0.12", default-features = false, features = ["winit-29"] }
glow = "0.13"
winit = { version = "0.29", features = ["x11", "wayland"] }
raw-window-handle = "0.6"

anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
time = "0.3"
