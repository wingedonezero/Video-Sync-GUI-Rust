[package]
name = "vsg-gui"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
log = "0.4"
env_logger = "0.11"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# GUI stack (pinned to modern ecosystem)
winit = { version = "0.30", features = ["rwh_06"] }
glutin = { version = "0.32", default-features = false, features = ["egl", "x11"] }
glutin-winit = "0.5"
raw-window-handle = "0.6"

imgui = "0.12"
imgui-winit-support = "0.13"
imgui-glow-renderer = "0.13"
glow = "0.16"

# Our core
vsg-core = { path = "../vsg-core" }

[features]
# headless build toggle if needed later
default = []
